name: VitalSync CI/CD

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installation des dependances
        run: cd backend && npm install
      - name: Lint
        run: cd backend && npm run lint
      - name: Tests unitaires
        run: cd backend && npm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build et push backend
        run: |
          docker build -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }} ./backend
          docker push ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
      - name: Build et push frontend
        run: |
          docker build -t ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} ./frontend
          docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Creer le fichier .env
        run: |
          echo "POSTGRES_USER=vitalsync" >> .env
          echo "POSTGRES_PASSWORD=changeme" >> .env
          echo "POSTGRES_DB=vitalsync_db" >> .env
      - name: Deploiement staging
        run: docker compose up -d --build
      - name: Attendre le demarrage
        run: sleep 10
      - name: Health check backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check echoue avec status $STATUS"
            docker compose logs
            exit 1
          fi
          echo "Health check OK"
      - name: Arret des services
        if: always()
        run: docker compose down
